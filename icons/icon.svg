<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 240">
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#F58A66"/>
      <stop offset="100%" stop-color="#DC5934"/>
    </linearGradient>
  </defs>

  <rect width="240" height="240" fill="#FFFFFF"/>

  <g transform="translate(120 120)">
    <!-- 12 hour tick marks (outer) -->
    <g stroke="rgba(0,0,0,0.18)" stroke-width="2.4" stroke-linecap="round">
      <line x1="0" y1="-104" x2="0" y2="-96"/>
      <line x1="0" y1="-104" x2="0" y2="-96" transform="rotate(30)"/>
      <line x1="0" y1="-104" x2="0" y2="-96" transform="rotate(60)"/>
      <line x1="0" y1="-104" x2="0" y2="-96" transform="rotate(90)"/>
      <line x1="0" y1="-104" x2="0" y2="-96" transform="rotate(120)"/>
      <line x1="0" y1="-104" x2="0" y2="-96" transform="rotate(150)"/>
      <line x1="0" y1="-104" x2="0" y2="-96" transform="rotate(180)"/>
      <line x1="0" y1="-104" x2="0" y2="-96" transform="rotate(210)"/>
      <line x1="0" y1="-104" x2="0" y2="-96" transform="rotate(240)"/>
      <line x1="0" y1="-104" x2="0" y2="-96" transform="rotate(270)"/>
      <line x1="0" y1="-104" x2="0" y2="-96" transform="rotate(300)"/>
      <line x1="0" y1="-104" x2="0" y2="-96" transform="rotate(330)"/>
    </g>

    <!-- minutes ring (slim, outer) ~50% filled -->
    <circle cx="0" cy="0" r="86" fill="none" stroke="rgba(0,0,0,0.06)" stroke-width="5"/>
    <circle cx="0" cy="0" r="86" fill="none" stroke="url(#g)" stroke-width="5"
            stroke-linecap="round"
            stroke-dasharray="540.354"
            stroke-dashoffset="270.18"
            transform="rotate(-90)"/>

    <!-- hours ring (thick, inner) ~75% filled -->
    <circle cx="0" cy="0" r="64" fill="none" stroke="rgba(0,0,0,0.05)" stroke-width="22"/>
    <circle cx="0" cy="0" r="64" fill="none" stroke="url(#g)" stroke-width="22"
            stroke-linecap="round"
            stroke-dasharray="402.124"
            stroke-dashoffset="100.53"
            transform="rotate(-90)"/>
  </g>
</svg>
