<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 240">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#F58A66"/>
      <stop offset="100%" stop-color="#DC5934"/>
    </linearGradient>
  </defs>

  <!-- Full-bleed orange so the platform mask never reveals an awkward edge -->
  <rect width="240" height="240" fill="url(#bg)"/>

  <!-- Composition fits inside the central 80% safe zone (radius 96) -->
  <g transform="translate(120 120)" stroke="#FFFFFF" stroke-linecap="round" fill="none">
    <!-- 12 hour tick marks (subtle) -->
    <g stroke="rgba(255,255,255,0.45)" stroke-width="2.2">
      <line x1="0" y1="-86" x2="0" y2="-80"/>
      <line x1="0" y1="-86" x2="0" y2="-80" transform="rotate(30)"/>
      <line x1="0" y1="-86" x2="0" y2="-80" transform="rotate(60)"/>
      <line x1="0" y1="-86" x2="0" y2="-80" transform="rotate(90)"/>
      <line x1="0" y1="-86" x2="0" y2="-80" transform="rotate(120)"/>
      <line x1="0" y1="-86" x2="0" y2="-80" transform="rotate(150)"/>
      <line x1="0" y1="-86" x2="0" y2="-80" transform="rotate(180)"/>
      <line x1="0" y1="-86" x2="0" y2="-80" transform="rotate(210)"/>
      <line x1="0" y1="-86" x2="0" y2="-80" transform="rotate(240)"/>
      <line x1="0" y1="-86" x2="0" y2="-80" transform="rotate(270)"/>
      <line x1="0" y1="-86" x2="0" y2="-80" transform="rotate(300)"/>
      <line x1="0" y1="-86" x2="0" y2="-80" transform="rotate(330)"/>
    </g>

    <!-- minutes ring (slim, outer) ~50% filled -->
    <circle cx="0" cy="0" r="68" stroke="rgba(255,255,255,0.25)" stroke-width="4"/>
    <circle cx="0" cy="0" r="68" stroke="#FFFFFF" stroke-width="4"
            stroke-dasharray="427.257"
            stroke-dashoffset="213.63"
            transform="rotate(-90)"/>

    <!-- hours ring (thick, inner) ~75% filled -->
    <circle cx="0" cy="0" r="50" stroke="rgba(255,255,255,0.22)" stroke-width="18"/>
    <circle cx="0" cy="0" r="50" stroke="#FFFFFF" stroke-width="18"
            stroke-dasharray="314.159"
            stroke-dashoffset="78.54"
            transform="rotate(-90)"/>
  </g>
</svg>
